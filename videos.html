<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trees — Moving</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0f;
      width: 100vw; height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    #player {
      width: 100vw; height: 100vh;
      object-fit: cover;
      display: block;
    }

    #caption {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
    #caption .en {
      font-family: 'Cormorant', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: 15px;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.5);
      display: block;
    }
    #caption .zh {
      font-family: 'Cormorant', Georgia, serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.3);
      display: block;
      margin-top: 5px;
    }

    a.back {
      position: fixed;
      top: 24px; left: 28px;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      transition: color 0.2s;
      cursor: default;
    }
    a.back:hover { color: rgba(255,255,255,0.7); cursor: pointer; }

    #muteBtn {
      position: fixed;
      bottom: 28px; right: 28px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      padding: 6px;
      line-height: 0;
      transition: color 0.2s;
    }
    #muteBtn:hover { color: rgba(255,255,255,0.75); }
    #muteBtn svg { display: block; }
  </style>
</head>
<body>

  <video id="player" autoplay muted playsinline></video>
  <a class="back" href="index.html">← Field Guide</a>

  <div id="caption">
    <span class="en">Rustling light. Shifting shade.</span>
    <span class="zh">木漏れ日　葉音　森閑</span>
  </div>

  <button id="muteBtn" aria-label="Toggle mute">
    <svg id="iconMuted" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <line x1="23" y1="9" x2="17" y2="15"/>
      <line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
    <svg id="iconSound" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
  </button>

  <script>
    const VIDEOS = [
      'movies/uploads/IMG_9280.mp4',
      'movies/uploads/IMG_9243.mp4',
      'movies/uploads/IMG_9244.mp4',
      'movies/uploads/IMG_9148.mp4',
      'movies/uploads/IMG_9147.mp4',
      'movies/uploads/IMG_9146.mp4',
      'movies/uploads/IMG_8815.mp4',
      'movies/uploads/IMG_3678.mp4',
      'movies/uploads/IMG_3706.mp4',
      'movies/uploads/IMG_5936.mp4',
      'movies/uploads/IMG_1456.mp4',
      'movies/uploads/IMG_0609.mp4',
      'movies/uploads/IMG_1481.mov',
    ];

    const player = document.getElementById('player');

    let current = -1;

    function pickRandom() {
      if (VIDEOS.length === 1) return 0;
      let next;
      do { next = Math.floor(Math.random() * VIDEOS.length); } while (next === current);
      return next;
    }

    function play(index) {
      current = index;
      player.src = VIDEOS[index];
      player.play();
    }

    // spacebar → random next
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        play(pickRandom());
      }
    });

    // tap on mobile
    document.addEventListener('pointerup', () => play(pickRandom()));

    // auto-advance when clip ends
    player.addEventListener('ended', () => play(pickRandom()));

    // mute toggle
    const muteBtn   = document.getElementById('muteBtn');
    const iconMuted = document.getElementById('iconMuted');
    const iconSound = document.getElementById('iconSound');

    function setMuted(muted) {
      player.muted = muted;
      iconMuted.style.display = muted ? 'block' : 'none';
      iconSound.style.display = muted ? 'none'  : 'block';
    }

    muteBtn.addEventListener('click', () => setMuted(!player.muted));

    // start
    play(pickRandom());
  </script>
</body>
</html>
