<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trees — Field Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="site-label">Field Guide</span>
      <h1>Trees</h1>
      <p class="site-sub">A personal botanical record</p>
    </div>
    <div class="header-ghost" aria-hidden="true">Trees</div>
  </header>

  <main id="gallery"></main>

  <div class="gallery-footer">
    <button id="toggleAll" class="toggle-btn">View all specimens</button>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <button class="modal-close" id="modalClose" aria-label="Close">✕</button>

    <div class="modal-inner">
      <div class="modal-photo-wrap">
        <img id="modalPhoto" src="" alt="">
      </div>

      <div class="modal-right">
        <div class="modal-species-block">
          <p class="species-common"    id="modalCommon"></p>
          <p class="species-scientific" id="modalScientific"></p>
          <p class="species-zh"         id="modalZh"></p>
        </div>

        <div class="divider"></div>

        <div class="modal-meta">
          <p class="meta-row"><span class="meta-label">Location</span><span id="modalLocation"></span></p>
          <p class="meta-row"><span class="meta-label">Date</span><span id="modalDate"></span></p>
          <p class="meta-row"><span class="meta-label">Coordinates</span><span id="modalCoords"></span></p>
        </div>

        <div class="divider"></div>
        <p class="modal-note" id="modalNote"></p>

        <div class="divider"></div>

        <div class="related-tabs">
          <button class="tab-btn active" id="tabGraph">
            <svg viewBox="0 0 20 20" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="10" cy="3"  r="2"/><circle cx="3" cy="17" r="2"/><circle cx="17" cy="17" r="2"/>
              <line x1="10" y1="5" x2="3"  y2="15"/>
              <line x1="10" y1="5" x2="17" y2="15"/>
              <line x1="3"  y1="17" x2="17" y2="17"/>
            </svg>
            Related
          </button>
          <button class="tab-btn" id="tabMap">
            <svg viewBox="0 0 20 20" width="13" height="13" fill="currentColor">
              <path d="M10 2C7.24 2 5 4.24 5 7c0 4.38 5 11 5 11s5-6.62 5-11c0-2.76-2.24-5-5-5zm0 7.5c-1.38 0-2.5-1.12-2.5-2.5S8.62 4.5 10 4.5s2.5 1.12 2.5 2.5S11.38 9.5 10 9.5z"/>
            </svg>
            Map
          </button>
        </div>

        <div id="graphView" class="related-view"></div>
        <div id="mapView"   class="related-view hidden"></div>
      </div>
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
